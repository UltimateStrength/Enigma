<!DOCTYPE html>

    <html lang="en">

    <head>
        
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <link rel="stylesheet" href="/css/levelstyle.css">
        <link rel="icon" href="/assets/default.png">

        <title>Level 1 | IDK Riddle</title>

    </head>

        <body>
            
            <div class="container">
                <div class="level">Level 1</div>
                <input type="text" placeholder="Enter Code" class="textbox">
                <button class="button">Confirm</button>
              </div>
        
            <div class="content">
                <div class="image-container">
                  <img src="/assets/default.png" alt="Image" class="image">
                  <p class="text">Text Area</p>
                </div>
              </div>
            
            <button class="hint-button" onclick="showMessage()">Tip</button>
        
              <audio id="myAudio" loop>
                <source src="/assets/audio.mp3" type="audio/mp3">
              </audio>

            <script src="/scripts/levelscript.js"></script>
            <script src="/scripts/generalscript.js"></script>

        </body>

</html>
